<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="100%" height="200">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4A00E0">
        <animate attributeName="stop-color" values="#4A00E0;#8E2DE2;#4A00E0" dur="5s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#8E2DE2">
        <animate attributeName="stop-color" values="#8E2DE2;#4A00E0;#8E2DE2" dur="5s" repeatCount="indefinite" />
      </stop>
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#bgGradient)" rx="15" ry="15" />
  <text x="50%" y="45%" dominant-baseline="middle" text-anchor="middle" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#ffffff">
    Awesome Preference Tuning
  </text>
  <text x="50%" y="70%" dominant-baseline="middle" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#f0f0f0">
    History, Progression, Variants, &amp; Applications
  </text>
</svg>
